<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calculator App{% endblock %}</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        
        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        /* ===== NAVIGATION ===== */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .nav-btn {
            background: white;
            color: #333;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }
        
        .nav-btn.active {
            background: #764ba2;
            color: white;
        }
        
        /* ===== CARDS ===== */
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #764ba2;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        /* ===== BUTTONS ===== */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(118, 75, 162, 0.4);
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .btn-danger:hover {
            background: #e55a5a;
        }
        
        /* ===== RESULTS ===== */
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        .result-box.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .result-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #764ba2;
            text-align: center;
        }
        
        .result-label {
            text-align: center;
            color: #666;
            margin-top: 5px;
        }
        
        .result-category {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .category-normal { background: #d4edda; color: #155724; }
        .category-underweight { background: #fff3cd; color: #856404; }
        .category-overweight { background: #ffe5d0; color: #854d2a; }
        .category-obese { background: #f8d7da; color: #721c24; }
        
        /* ===== HISTORY ===== */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        .history-item:hover {
            background: #f8f9fa;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-details {
            flex: 1;
        }
        
        .history-result {
            font-weight: 600;
            color: #764ba2;
        }
        
        .history-category {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .history-empty {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        /* ===== CALCULATOR SPECIFIC ===== */
        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .ops-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .ops-grid button {
            padding: 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ops-grid button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .ops-grid button.selected {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }
        
        .unit-select {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: center;
        }
        
        .conversion-arrow {
            font-size: 1.5rem;
            color: #764ba2;
            font-weight: 700;
        }
        
        .bmi-scale {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.85rem;
            color: #666;
        }
        
        .bmi-scale-bar {
            height: 20px;
            border-radius: 10px;
            background: linear-gradient(to right, #ff6b6b, #ffd93d, #6bcf7f, #ffd93d, #ff6b6b);
            margin: 10px 0;
        }
        
        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .container {
                padding: 0 15px;
            }
            
            .card {
                padding: 25px;
            }
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .calc-grid {
                grid-template-columns: 1fr;
            }
            
            .unit-select {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .conversion-arrow {
                text-align: center;
                transform: rotate(90deg);
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            
            .history-result {
                align-self: flex-start;
            }
            
            .result-number {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 600px) {
            .nav-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            
            .nav-btn {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 400px) {
            .nav-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.5rem;
            }
            
            .card {
                padding: 15px;
                border-radius: 12px;
            }
        }
        
        /* ===== PRINT STYLES ===== */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .nav-grid,
            .btn-primary,
            .btn-danger {
                display: none;
            }
            
            .card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧮 Calculator Suite</h1>
            <p>Three calculators in one place</p>
        </header>
        
        <nav class="nav-grid">
            <a href="{{ url_for('main.basic_calculator') }}" class="nav-btn" data-page="basic">➕ Basic</a>
            <a href="{{ url_for('main.bmi_calculator') }}" class="nav-btn" data-page="bmi">⚖️ BMI</a>
            <a href="{{ url_for('main.unit_converter') }}" class="nav-btn" data-page="converter">🔄 Convert</a>
            <a href="{{ url_for('main.history_page') }}" class="nav-btn" data-page="history">📋 History</a>
            <a href="{{ url_for('main.about') }}" class="nav-btn" data-page="about">ℹ️ About</a>
        </nav>
        
        {% block content %}{% endblock %}
        
        <!-- UPDATED FOOTER - Removed "Built with Flask ❤️ | Practice Project" -->
        <footer style="text-align: center; color: white; padding: 30px 0 10px; opacity: 0.8;">
            <p>© 2026 | All Rights Reserved</p>
        </footer>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/calculator.js') }}"></script>
    <script src="{{ url_for('static', filename='js/validation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
