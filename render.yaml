services:
  - type: web
    name: calculator-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///calculator.db
      - key: PYTHON_VERSION
        value: 3.11.0
